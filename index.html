<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение 💌</title>
    <style>
        :root {
            --pink: #ff4d6d;
            --soft-pink: #ffcad4;
            --white: #ffffff;
            --text: #590d22;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f8edeb, #ffcad4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Анимация сердечек */
        .heart-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        .heart {
            position: absolute; color: var(--pink); opacity: 0.3;
            animation: float 6s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); }
            100% { transform: translateY(-10vh) scale(1); }
        }

        /* Карточка */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
            z-index: 1;
            transition: 0.5s;
        }

        h1 { color: var(--text); font-size: 24px; margin-bottom: 20px; }
        .emoji { font-size: 60px; display: block; margin-bottom: 20px; animation: pulse 2s infinite; }
        
        button {
            padding: 12px 25px; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px;
        }
        .btn-yes { background: var(--pink); color: white; animation: pulse-btn 1.5s infinite; }
        .btn-no { background: white; color: var(--pink); border: 2px solid var(--pink); }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes pulse-btn { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); } }

        .hidden { display: none !important; }
        .input-box { margin: 15px 0; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        
        .food-opt { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .food-btn { background: #fff5f5; border: 1px solid var(--soft-pink); padding: 10px; border-radius: 15px; }
        .food-btn:hover { background: var(--pink); color: white; }
    </style>
</head>
<body>

    <div class="heart-bg" id="hearts"></div>

    <div class="card" id="card">
        <!-- Стр 1 -->
        <div id="p1">
            <span class="emoji">💌</span>
            <h1>Хочешь сходить со мной на свидание?</h1>
            <button class="btn-yes" onclick="nextPage('p2')">Да!</button>
            <button class="btn-no" id="no-btn">Нет</button>
        </div>

        <!-- Стр 2 -->
        <div id="p2" class="hidden">
            <span class="emoji">🥰</span>
            <h1>Я так и знал! Ты самая лучшая!</h1>
            <button class="btn-yes" onclick="nextPage('p3')">Дальше</button>
        </div>

        <!-- Стр 3 -->
        <div id="p3" class="hidden">
            <h1>Выбери дату</h1>
            <input type="date" class="input-box" id="date">
            <input type="time" class="input-box" id="time">
            <button class="btn-yes" onclick="saveDateTime()">Продолжить</button>
        </div>

        <!-- Стр 4 -->
        <div id="p4" class="hidden">
            <h1>Что будем делать?</h1>
            <div class="food-opt">
                <button class="food-btn" onclick="finish('Бургеры 🍔')">Бургеры 🍔</button>
                <button class="food-btn" onclick="finish('Суши 🍣')">Суши 🍣</button>
                <button class="food-btn" onclick="finish('Пиццу 🍕')">Пиццу 🍕</button>
                <button class="food-btn" onclick="finish('Прогулку 🌸')">Прогулку 🌸</button>
            </div>
        </div>

        <!-- Стр 5 -->
        <div id="p5" class="hidden">
            <span class="emoji">✨</span>
            <h1 id="final-text">До встречи!</h1>
            <button class="btn-no" onclick="location.reload()">Начать сначала</button>
        </div>
    </div>

    <script>
        // Создаем сердечки
        const heartsContainer = document.getElementById('hearts');
        for(let i=0; i<15; i++) {
            const h = document.createElement('div');
            h.innerHTML = '❤';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + '%';
            h.style.animationDelay = Math.random() * 5 + 's';
            h.style.fontSize = Math.random() * 20 + 20 + 'px';
            heartsContainer.appendChild(h);
        }

        function nextPage(id) {
            document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        let date = "", time = "";
        function saveDateTime() {
            date = document.getElementById('date').value || "скоро";
            time = document.getElementById('time').value || "вечером";
            nextPage('p4');
        }

        function finish(choice) {
            document.getElementById('final-text').innerText = `Жду тебя ${date} в ${time}. Выбрано: ${choice}! ✨`;
            nextPage('p5');
        }

        // Кнопка "Нет" убегает
        const noBtn = document.getElementById('no-btn');
        noBtn.onmouseover = () => {
            noBtn.style.position = 'absolute';
            noBtn.style.left = Math.random() * 80 + '%';
            noBtn.style.top = Math.random() * 80 + '%';
        }
    </script>
</body>
</html>
